services:
  mongodb:
    image: mongo:latest
    container_name: course_builder_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - course_builder_network

  AISERVICE:
    build: ./AISERVICE
    image: aiservice
    container_name: ai_service
    ports:
      - "8000:8000"
    volumes:
      - ./AISERVICE:/app
    environment:
      - PORT=8000
    networks:
      - course_builder_network
    restart: always

  Backend:
    build: ./Backend
    image: backend
    container_name: backend
    ports:
      - "5002:5002"
    volumes:
      - ./Backend:/app
      - /app/node_modules
    environment:
      - PORT=5002
      - MONGO_URI=mongodb://mongodb:27017/ai_course_db
      - AI_ENGINE_URL=http://AISERVICE:8000
    depends_on:
      - mongodb
      - AISERVICE
    networks:
      - course_builder_network
    restart: always

volumes:
  mongodb_data:

networks:
  course_builder_network:
    driver: bridge